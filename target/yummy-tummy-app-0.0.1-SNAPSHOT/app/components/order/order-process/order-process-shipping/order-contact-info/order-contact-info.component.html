<div [formGroup]="contactFormGroup" class="col-lg-12 row g-3 center-container custom-center-container">
    <div class="title mb-2" [ngStyle]="{'padding-top' : '1px'}">CONTACT INFORMATION</div>

    <div class="col-md-6 form-group">
        <label class="form-label" for="name">Name: </label>
        <input type="text" class="form-control" id="name" placeholder="enter name" formControlName="name_">
    </div>
    <div class="col-md-4 form-group">
        <label class="form-label" for="email">Email:</label>
        <input type="email" class="form-control" id="email" placeholder="enter email"  formControlName="email_">
    </div>
    <div class="col-md-2 form-group">
        <label class="form-label" for="phone">Phone:</label>
        <input type="phone" class="form-control" id="phone" placeholder="enter phone number"  formControlName="phone_">
    </div>
</div>
