<div [formGroup]="shippingFormGroupObject" class="col-lg-12 row g-3 center-container custom-center-container">
    <div class="title mb-2" [ngStyle]="{'padding-top' : '1px'}">SHIPPING INFORMATION</div>

    <!-- <form class="row g-3 class-form-total"> -->
    <div class="col-md-6 form-group">
        <label class="form-label" for="house-no">House/Flat/Block No:</label>
        <input type="text" class="form-control" id="house-no" placeholder="enter door number" formControlName="doorNumber_">
    </div>
    <div class="col-md-6 form-group">
        <label class="form-label" for="address-1">Address Line 1:</label>
        <input type="text" class="form-control" id="address-1" placeholder="enter address line 1" formControlName="addressLine1_">
    </div>
    <div class="col-md-6 form-group">
        <label class="form-label" for="address-2">Address Line 2:</label>
        <input type="text" class="form-control" id="address-2" placeholder="enter address line 2" formControlName="addressLine2_">
    </div>
    <div class="col-md-6 form-group">
        <label class="form-label" for="address-city">City:</label>
        <input type="text" class="form-control" id="address-city" placeholder="enter city name" formControlName="city_">
    </div>
    <div class="col-md-6 form-group">
        <label class="form-label" for="address-state">State:</label>
        <select class="form-control form-select" id="address-state" formControlName="state_">
            <option value="" selected>select state</option>
            <option *ngFor="let state of states">{{state}}</option>
        </select>
    </div>
    <div class="col-md-4 form-group">
        <label class="form-label" for="address-country">Country:</label>
        <input type="text" class="form-control" id="address-country" placeholder="enter country name" formControlName="country_">
    </div>
    <div class="col-md-2 form-group">
        <label class="form-label" for="address-pincode">Pincode:</label>
        <input type="text" class="form-control" id="address-pincode" placeholder="enter pincode" formControlName="pincode_">
    </div>
    <!-- </form> -->
</div>
<div class="button-container">
    <button class="cancel-button" type="button">CANCEL</button>
    <span>items added to order</span>
    <button class="save-button" type="submit" (click) ="saveLocationData()">SAVE</button>
</div>
